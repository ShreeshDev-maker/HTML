<!DOCTYPE html>
<html lang="en">
  <head>
    <title>RSVP</title>
  </head>
  <body>
    <form>
    <h2>RSVP</h2>
    <p>Come and make our special day more awesome!</p>
    <br>
   First Name: <input type ="text" required>
    <br><br>
    Last Name: <input type ="text">
    <br><br>
    Are you coming?<br>
    <input type="radio" name="coming"> Yes
    <br>
    <input type="radio" name="coming"> No
    <br>
    <input type="radio" name="coming"> Maybe<br>
    Any dietary restrictions for main course?<br>
    <input type ="checkbox">Vegetarian<br>
    <input type ="checkbox">Vegan<br>
    <input type ="checkbox">Gluten-free<br>
    <input type ="checkbox">Lactose-intolerant<br>
    <input type ="submit" value = "Send">
    </form>
</body>
</html>
